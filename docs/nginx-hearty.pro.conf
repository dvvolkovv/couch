# nginx configuration for hearty.pro
# Deploy to: /etc/nginx/sites-available/hearty.pro
# Enable with: ln -s /etc/nginx/sites-available/hearty.pro /etc/nginx/sites-enabled/
#
# After initial deploy, run certbot to obtain SSL certificates:
#   certbot --nginx -d hearty.pro -d www.hearty.pro
# Certbot will automatically add the SSL/443 server block and update this file.

server {
    listen 80;
    server_name hearty.pro www.hearty.pro;

    # Backend API (NestJS on port 3200)
    location /api {
        proxy_pass http://localhost:3200;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400;
    }

    # Frontend (Next.js on port 3201)
    location / {
        proxy_pass http://localhost:3201;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400;
    }

    # Certbot ACME challenge (managed by certbot automatically)
    # location /.well-known/acme-challenge/ { ... }
}

